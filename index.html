<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Club Member Growth</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #f4f7fb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: white;
        padding: 25px 30px;
        border-radius: 16px;
        width: 400px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    .title {
        font-size: 20px;
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 10px;
    }

    .stats {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        font-size: 14px;
        color: #555;
    }

    .bar-container {
        width: 100%;
        height: 16px;
        background: #e6eef7;
        border-radius: 10px;
        overflow: hidden;
        position: relative;
    }

    .bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #4facfe, #43e97b);
        border-radius: 10px;
        animation: grow 2s ease forwards;
    }

    @keyframes grow {
        from { width: 0%; }
        to { width: 72%; } /* Change growth percentage here */
    }

    .growth-text {
        margin-top: 12px;
        font-size: 14px;
        color: #2ecc71;
        font-weight: 500;
    }

    .icon {
        font-size: 22px;
        margin-right: 8px;
    }

    .header {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
    }
</style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="icon">♟️</div>
        <div class="title">Club Member Growth</div>
    </div>

    <div class="stats">
        <span>Members: <strong>720</strong></span>
        <span>Goal: <strong>1000</strong></span>
    </div>

    <div class="bar-container">
        <div class="bar"></div>
    </div>

    <div class="growth-text">+120 members this month 🚀</div>
</div>

</body>
</html>
