<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alien Chess Hub Growth</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f7fb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    background: white;
    padding: 25px 30px;
    border-radius: 16px;
    width: 420px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

/* Header */
.header {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
}

.icon {
    font-size: 24px;
    margin-right: 10px;
}

.title {
    font-size: 20px;
    font-weight: 600;
    color: #2c3e50;
}

/* Stats */
.stats {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
    font-size: 14px;
    color: #555;
}

/* Progress bar */
.bar-container {
    width: 100%;
    height: 16px;
    background: #e6eef7;
    border-radius: 10px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4facfe, #43e97b);
    border-radius: 10px;
    transition: width 1.5s ease;
}

/* Footer */
.growth-text {
    margin-top: 12px;
    font-size: 14px;
    color: #2ecc71;
    font-weight: 500;
}
</style>
</head>

<body>

<div class="card">
    <div class="header">
        <div class="icon">👽♟️</div>
        <div class="title">Alien Chess Hub</div>
    </div>

    <div class="stats">
        <span>Members: <strong id="members">--</strong></span>
        <span>Goal: <strong>500</strong></span>
    </div>

    <div class="bar-container">
        <div class="bar" id="progressBar"></div>
    </div>

    <div class="growth-text" id="growthText">Loading...</div>
</div>

<script>
// 🔧 CONFIG
const GOAL = 500;
const API_URL = "https://your-api-url.com/members"; // <-- replace later

async function loadMembers() {
    try {
        // Example API response expected:
        // { "members": 320 }

        const res = await fetch(API_URL);
        const data = await res.json();

        const members = data.members;

        updateUI(members);

    } catch (err) {
        console.error("API failed, using demo data...");
        
        // fallback demo data
        const members = 275;
        updateUI(members);
    }
}

function updateUI(members) {
    const percent = Math.min((members / GOAL) * 100, 100);

    document.getElementById("members").textContent = members;

    const bar = document.getElementById("progressBar");
    setTimeout(() => {
        bar.style.width = percent + "%";
    }, 200);

    const remaining = GOAL - members;

    document.getElementById("growthText").textContent =
        remaining > 0
        ? `${remaining} members to goal 🚀`
        : "Goal reached! 🎉";
}

// Load on start
loadMembers();
</script>

</body>
</html>
